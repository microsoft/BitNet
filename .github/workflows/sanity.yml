name: Sanity CI

on:
  push:
    branches: [ main, 'add/*' ]
  pull_request:
    branches: [ main ]

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install minimal deps
        run: python -m pip install --upgrade pip
      - name: Run sanity tests
        run: |
          python -m pytest -q tests/test_sanity.py

  build-and-smoke:
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake clang libpthread-stubs0-dev
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build llama-cli
        run: cmake --build build --target llama-cli -j $(nproc)
      - name: Set up Python for dummy model generation
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install python deps for dummy model generation
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install transformers
      - name: Prepare tokenizer for dummy model
        run: |
          python - <<'PY'
from transformers import AutoTokenizer
tok = AutoTokenizer.from_pretrained('gpt2')
tok.save_pretrained('/tmp/hf_dummy')
PY
      - name: Write minimal config.json for dummy model
        run: |
          cat > /tmp/hf_dummy/config.json <<'JSON'
{
  "hidden_size": 768,
  "intermediate_size": 3072,
  "num_hidden_layers": 11,
  "num_attention_heads": 12,
  "vocab_size": 50257
}
JSON
      - name: Generate dummy GGUF model
        run: |
          mkdir -p tests/dummy
          python utils/generate-dummy-bitnet-model.py --outfile tests/dummy/ggml-model-i2_s.gguf /tmp/hf_dummy --model-size 125M
      - name: Upload dummy model artifact
        uses: actions/upload-artifact@v4
        with:
          name: dummy-model
          path: tests/dummy/ggml-model-i2_s.gguf
      - name: Run llama-cli --help smoke test
        run: build/bin/llama-cli --help

  inference-dummy:
    runs-on: ubuntu-latest
    needs: build-and-smoke
    steps:
      - uses: actions/checkout@v4
      - name: Download dummy model artifact (optional)
        uses: actions/download-artifact@v4
        with:
          name: dummy-model
          path: tests/dummy
          if-no-files-found: ignore
      - name: Validate downloaded GGUF
        run: |
          if [ -f tests/dummy/ggml-model-i2_s.gguf ]; then
            python3 utils/validate_gguf.py tests/dummy/ggml-model-i2_s.gguf
          else
            echo "No dummy model artifact found — skipping validation"
          fi

  notify-inference-dummy:
    runs-on: ubuntu-latest
    needs: inference-dummy
    if: always()
    steps:
      - name: Comment on PR if validator failed
        uses: actions/github-script@v6
        env:
          INFERENCE_RESULT: ${{ needs.inference-dummy.result }}
        with:
          script: |
            const result = process.env.INFERENCE_RESULT;
            if (result === 'success') {
              console.log('inference-dummy succeeded; no comment.');
              return;
            }
            const pr = context.payload.pull_request ? context.payload.pull_request.number : null;
            if (!pr) {
              console.log('No pull_request in context; skipping comment.');
              return;
            }
            const body = `:warning: GGUF validator in job \`inference-dummy\` returned **${result}**. See workflow run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body
            });
      - name: Run inference with dummy model if present
        run: |
          if [ -f tests/dummy/ggml-model-i2_s.gguf ]; then
            echo "Found dummy model, running inference"
            set +e
            build/bin/llama-cli -m tests/dummy/ggml-model-i2_s.gguf -p "CI test" -t 2 -n 8 || true
            set -e
          else
            echo "No dummy model artifact found — skipping inference test"
          fi
