<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitNet Studio</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --user-bg: #1f6feb22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; overflow: hidden;
  }
  aside {
    width: 300px; background: var(--panel); border-right: 1px solid var(--border);
    padding: 16px; display: flex; flex-direction: column; gap: 16px;
    overflow-y: auto;
  }
  aside h1 { font-size: 18px; color: var(--accent); }
  aside h2 { font-size: 13px; color: var(--muted); text-transform: uppercase;
             margin-bottom: 8px; }
  .model-item, .mcp-item {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 6px; cursor: pointer; font-size: 13px;
  }
  .model-item:hover { border-color: var(--accent); }
  .model-item.active { border-color: var(--green); background: #3fb95011; }
  .model-item .meta { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .mcp-item { cursor: default; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
         margin-right: 6px; }
  .dot.on { background: var(--green); } .dot.off { background: var(--red); }
  .tool-tag { display: inline-block; background: #58a6ff22; color: var(--accent);
              border-radius: 4px; padding: 1px 6px; font-size: 11px;
              margin: 2px 2px 0 0; }
  main { flex: 1; display: flex; flex-direction: column; }
  #chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 10px;
         white-space: pre-wrap; word-wrap: break-word; font-size: 14px;
         line-height: 1.5; }
  .msg.user { align-self: flex-end; background: var(--user-bg);
              border: 1px solid #1f6feb55; }
  .msg.assistant { align-self: flex-start; background: var(--panel);
                   border: 1px solid var(--border); }
  .msg.tool { align-self: flex-start; background: #23863622;
              border: 1px solid #23863655; font-size: 12px;
              color: var(--muted); max-width: 90%; }
  .msg.error { background: #f8514922; border: 1px solid var(--red); }
  #composer {
    display: flex; gap: 8px; padding: 16px 24px;
    border-top: 1px solid var(--border); background: var(--panel);
  }
  #input {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; font-size: 14px; resize: none; min-height: 48px;
    font-family: inherit;
  }
  #input:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent); color: #0d1117; border: none;
    border-radius: 8px; padding: 0 20px; font-weight: 600;
    cursor: pointer; font-size: 14px;
  }
  button:disabled { opacity: 0.4; cursor: wait; }
  .spinner { color: var(--muted); font-size: 13px; padding: 8px 24px; }
  #status-bar { padding: 6px 24px; font-size: 12px; color: var(--muted);
                border-top: 1px solid var(--border); }
</style>
</head>
<body>

<aside>
  <h1>⚡ BitNet Studio</h1>
  <div>
    <h2>Modelos</h2>
    <div id="models"></div>
  </div>
  <div>
    <h2>MCPs conectados</h2>
    <div id="mcps"></div>
  </div>
</aside>

<main>
  <div id="chat"></div>
  <div id="spinner" class="spinner" style="display:none">gerando…</div>
  <div id="composer">
    <textarea id="input" placeholder="Pergunte em português… (Enter envia, Shift+Enter quebra linha)"></textarea>
    <button id="send">Enviar</button>
  </div>
  <div id="status-bar">100% local · CPU-only · sem telemetria · persona D4</div>
</main>

<script>
const state = { model: null, history: [], busy: false };

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
  return r.json();
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

async function loadModels() {
  const data = await api('/v1/models');
  const box = document.getElementById('models');
  box.innerHTML = '';
  for (const m of data.data) {
    const item = el('div', 'model-item' + (m.loaded ? ' active' : ''));
    item.appendChild(el('div', null, m.id));
    item.appendChild(el('div', 'meta',
      (m.exists ? '' : '⚠ GGUF ausente · ') + (m.description || m.chat_template)));
    item.onclick = () => selectModel(m.id, item);
    if (m.loaded) state.model = m.id;
    box.appendChild(item);
  }
}

async function selectModel(name, item) {
  if (state.busy) return;
  document.querySelectorAll('.model-item').forEach(e => e.classList.remove('active'));
  item.classList.add('active');
  addMsg('tool', `carregando modelo ${name}…`);
  try {
    await api(`/v1/models/${name}/load`, { method: 'POST' });
    state.model = name;
    addMsg('tool', `modelo ${name} pronto`);
  } catch (e) { addMsg('error', `falha: ${e.message}`); }
}

async function loadMcps() {
  const data = await api('/mcp');
  const box = document.getElementById('mcps');
  box.innerHTML = '';
  for (const [name, info] of Object.entries(data)) {
    const item = el('div', 'mcp-item');
    const head = el('div');
    const dot = el('span', 'dot ' + (info.alive ? 'on' : 'off'));
    head.appendChild(dot);
    head.appendChild(document.createTextNode(name));
    item.appendChild(head);
    const tools = el('div');
    for (const t of info.tools.slice(0, 8))
      tools.appendChild(el('span', 'tool-tag', t.name.split('__')[1] || t.name));
    item.appendChild(tools);
    box.appendChild(item);
  }
  if (!Object.keys(data).length)
    box.appendChild(el('div', 'mcp-item', 'nenhum MCP (configs/mcp.json)'));
}

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  chat.appendChild(el('div', `msg ${role}`, text));
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || state.busy) return;
  if (!state.model) { addMsg('error', 'selecione um modelo primeiro'); return; }
  input.value = '';
  addMsg('user', text);
  state.history.push({ role: 'user', content: text });
  state.busy = true;
  document.getElementById('send').disabled = true;
  document.getElementById('spinner').style.display = 'block';
  try {
    const data = await api('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: state.model, messages: state.history }),
    });
    for (const t of data.tool_trace || [])
      addMsg('tool', `🔧 ${t.tool}(${JSON.stringify(t.arguments)})\n→ ${t.result.slice(0, 400)}`);
    const answer = data.choices[0].message.content;
    addMsg('assistant', answer);
    state.history.push({ role: 'assistant', content: answer });
  } catch (e) {
    addMsg('error', `erro: ${e.message}`);
  } finally {
    state.busy = false;
    document.getElementById('send').disabled = false;
    document.getElementById('spinner').style.display = 'none';
  }
}

document.getElementById('send').onclick = send;
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

loadModels(); loadMcps();
setInterval(loadMcps, 30000);
</script>
</body>
</html>
